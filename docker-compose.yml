services:
  hero-slot-studio:
    build: .
    image: hero-slot-studio:local
    container_name: hero-slot-studio
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
